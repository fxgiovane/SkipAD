<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SkipAD</title>
  <style>
    :root {
      --bg: #09090b;
      --card: rgba(255, 255, 255, 0.03);
      --card-hover: rgba(255, 255, 255, 0.05);
      --border: rgba(255, 255, 255, 0.08);
      --primary: #a855f7;
      --secondary: #06b6d4;
      --text: #f4f4f5;
      --muted: #a1a1aa;
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      padding: 16px;
      overflow: hidden;
      animation: fadeIn 0.15s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .logo-container {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .logo-container img {
      width: 24px;
      height: 24px;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .sw {
      position: relative;
      width: 36px;
      height: 20px;
    }
    .sw input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .sw .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #27272a;
      border-radius: 20px;
      transition: all 0.25s ease;
      border: 1px solid var(--border);
    }
    .sw .slider::before {
      content: "";
      position: absolute;
      height: 12px;
      width: 12px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: all 0.25s ease;
    }
    .sw input:checked + .slider {
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      border-color: transparent;
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
    }
    .sw input:checked + .slider::before {
      transform: translateX(16px);
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: all 0.25s ease;
    }
    .card:hover {
      background: var(--card-hover);
      border-color: rgba(255, 255, 255, 0.12);
    }
    .counter-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .counter-value {
      font-size: 32px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--secondary), var(--primary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2px;
      display: inline-block;
    }
    .counter-desc {
      font-size: 11px;
      color: var(--muted);
    }
    footer {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10px;
      color: var(--muted);
    }
    #btn-reset {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 4px;
      border-radius: 4px;
      display: inline-flex;
      align-items: center;
      transition: all 0.2s ease;
    }
    #btn-reset:hover {
      color: #ef4444;
      background: rgba(239, 68, 68, 0.1);
      transform: rotate(-45deg);
    }

    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-12px); }
      60% { transform: translateY(-6px); }
    }
    .anim-bounce { animation: bounce 0.8s ease; }

    @keyframes spin3d {
      0% { transform: rotateY(0); }
      100% { transform: rotateY(360deg); }
    }
    .anim-spin3d { animation: spin3d 0.8s ease-out; }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
    .anim-pulse { animation: pulse 0.5s ease-in-out; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-4px); }
      40%, 80% { transform: translateX(4px); }
    }
    .anim-shake { animation: shake 0.4s ease-in-out; }

    @keyframes flip {
      0% { transform: rotateX(0); }
      100% { transform: rotateX(360deg); }
    }
    .anim-flip { animation: flip 0.8s ease-out; }

    @keyframes zoomin {
      0% { transform: scale(0.5); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .anim-zoomin { animation: zoomin 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); }

    @keyframes slidedown {
      0% { transform: translateY(-20px); opacity: 0; }
      100% { transform: translateY(0); opacity: 1; }
    }
    .anim-slidedown { animation: slidedown 0.5s cubic-bezier(0.16, 1, 0.3, 1); }

    @keyframes rubberBand {
      0% { transform: scale3d(1, 1, 1); }
      30% { transform: scale3d(1.2, 0.8, 1); }
      40% { transform: scale3d(0.8, 1.2, 1); }
      50% { transform: scale3d(1.1, 0.9, 1); }
      65% { transform: scale3d(0.95, 1.05, 1); }
      75% { transform: scale3d(1.05, 0.95, 1); }
      100% { transform: scale3d(1, 1, 1); }
    }
    .anim-rubberband { animation: rubberBand 0.7s ease; }

    @keyframes flash {
      0%, 50%, 100% { opacity: 1; }
      25%, 75% { opacity: 0.3; }
    }
    .anim-flash { animation: flash 0.6s ease; }

    @keyframes swing {
      20% { transform: rotate3d(0, 0, 1, 12deg); }
      40% { transform: rotate3d(0, 0, 1, -8deg); }
      60% { transform: rotate3d(0, 0, 1, 4deg); }
      80% { transform: rotate3d(0, 0, 1, -4deg); }
      100% { transform: rotate3d(0, 0, 1, 0deg); }
    }
    .anim-swing { animation: swing 0.8s ease; transform-origin: top center; }
  </style>
</head>
<body>
  <header>
    <div class="logo-container">
      <img src="icons/icon32.png" alt="Logo">
      <h1 id="ext-title" data-i18n="extName">SkipAD</h1>
    </div>
    <label class="sw">
      <input type="checkbox" id="toggle-active" checked>
      <span class="slider"></span>
    </label>
  </header>

  <div class="card">
    <div class="counter-label" id="label-skipped" data-i18n="skippedLabel">Anúncios Pulados</div>
    <div class="counter-value" id="counter">0</div>
    <div class="counter-desc" id="desc-skipped" data-i18n="skippedDesc">Economizando seu tempo de forma automática</div>
  </div>

  <footer>
    <span>v1.0.0</span>
    <button id="btn-reset" title="Resetar estatísticas">
      <svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
      </svg>
    </button>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
